<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback - EventKonnect</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #FFF5E4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .feedback-card { background: white; padding: 3rem; border-radius: 30px; width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .stars { font-size: 2rem; margin: 1.5rem 0; cursor: pointer; }
        textarea { width: 100%; padding: 1rem; border: 2px solid #eee; border-radius: 15px; outline: none; margin-bottom: 1.5rem; }
        button { background: #FF6B35; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="feedback-card">
        <h2>Rate your Experience</h2>
        <p style="color: #888;">How was the Tech Symposium?</p>
        <div class="stars">⭐⭐⭐⭐⭐</div>
        <textarea rows="4" placeholder="Your comments..."></textarea>
        <button onclick="window.location.href='AttendeeDashboard.html'">Submit Feedback</button>
    </div>
</body>
</html>
